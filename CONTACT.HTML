<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Waitlist | Lisa’s Busy Bees Childcare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="bg-amber-400 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center text-stone-900">
            <a href="index.html" class="text-2xl font-bold flex items-center gap-2">
                <span class="text-3xl">🐝</span> Lisa's Busy Bees
            </a>
            <div class="hidden md:flex space-x-8 font-semibold">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="about.html" class="hover:text-white transition">About</a>
                <a href="pricing.html" class="hover:text-white transition">Programs & Pricing</a>
                <a href="contact.html" class="hover:text-white transition">Contact & Waitlist</a>
            </div>
        </div>
    </nav>

    <section class="py-16 container mx-auto px-6 max-w-2xl">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold text-amber-900 mb-4">Join Our Waitlist</h2>
            <p class="text-stone-600">Fill out the form below and we will get back to you about availability.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-amber-100">
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block font-bold mb-2">Your Name</label>
                        <input type="text" name="name" required class="w-full p-3 bg-stone-50 border rounded-xl focus:ring-2 focus:ring-amber-400 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold mb-2">Email Address</label>
                        <input type="email" name="email" required class="w-full p-3 bg-stone-50 border rounded-xl focus:ring-2 focus:ring-amber-400 outline-none">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block font-bold mb-2">Preferred Location</label>
                    <select name="location" class="w-full p-3 bg-stone-50 border rounded-xl focus:ring-2 focus:ring-amber-400 outline-none">
                        <option>Port Alberni (Locke Rd)</option>
                        <option>Central Port Alberni (10th Ave)</option>
                        <option>North Nanaimo (Owlstone Pl)</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block font-bold mb-2">Message (Include child's age & desired start date)</label>
                    <textarea name="message" rows="4" required class="w-full p-3 bg-stone-50 border rounded-xl focus:ring-2 focus:ring-amber-400 outline-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-amber-500 text-white font-bold py-4 rounded-xl hover:bg-amber-600 shadow-lg transition duration-300">
                    Send Inquiry 🐝
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-stone-900 text-white py-12 px-6">
        <div class="container mx-auto grid md:grid-cols-3 gap-8">
            <div><h4 class="text-xl font-bold mb-4 text-amber-400">Lisa's Busy Bees</h4></div>
            <div><h4 class="text-lg font-bold mb-4 text-amber-400">Contact</h4><p>📞 01456789</p></div>
            <div><p>📧 help@locksmitNY.com</p></div>
        </div>
    </footer>

</body>
</html>
